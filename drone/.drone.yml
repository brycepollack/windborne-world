kind: pipeline
type: docker
name: deploy-windborne

platform:
  os: linux
  arch: arm64

trigger:
  branch:
    - main
  event:
    - push
    - custom

steps:
  - name: deploy next
    image: docker:24.0-cli
    volumes:
      - name: docker_socket
        path: /var/run/docker.sock
      - name: host_secrets
        path: /host/secrets/windborne
    commands:
      - set -e
      - export GOOGLE_KEY=$(grep NEXT_PUBLIC_GOOGLE_MAPS_API_KEY /host/secrets/windborne/.env | cut -d '=' -f2)
      - docker build --build-arg NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=$GOOGLE_KEY -t windborne-next .
      - docker rm -f windborne-next || true
      - docker run -d -p 3002:3000 --name windborne-next windborne-next

volumes:
  - name: docker_socket
    host:
      path: /var/run/docker.sock
  - name: host_secrets
    host:
      path: /secrets/windborne
