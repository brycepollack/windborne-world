kind: pipeline
type: docker
name: deploy-windborne

platform:
  os: linux
  arch: arm64

trigger:
  branch:
    - main
  event:
    - push
    - custom

steps:
  - name: deploy next
    image: docker:24.0-cli
    volumes:
      - name: docker_socket
        path: /var/run/docker.sock
      - name: secrets
        path: /secrets/windborne
      - name: windborne
        path: /services/windborne
    commands:
      - set -e
      - apk add --no-cache docker-cli rsync
      - mkdir -p /services/windborne
      - rsync -av --delete /drone/src/ /services/windborne/
      - cd /services/windborne
      - docker compose -f docker-compose.yml -f docker-compose.production.yml pull
      - docker compose -f docker-compose.yml -f docker-compose.production.yml up -d --build

volumes:
  - name: docker_socket
    host:
      path: /var/run/docker.sock
  - name: windborne
    host:
      path: /services/windborne
  - name: secrets
    host:
      path: /secrets/windborne
